<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Residences - Duchess & Duke</title>
    <link rel="stylesheet" href="style.css">

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <header class="main-header">
        <nav class="navbar">
            <a href="#home" class="logo-link">
                <div class="logo">
                    <img src="images/logo.png" alt="Duchess & Duke Icon" class="logo-icon">

                    <span class="logo-text" link="#home">
                        <span class="brand-name">Duchess & Duke</span>
                        <span class="brand-sub">Housing</span>
                    </span>
                </div>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="places.html">Places</a></li>
                <li><a href="index.html#main-footer">Contact us</a></li>
                <li><a href="connect.html" class="btn-connect">Connect</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="places" class="places-section">
            <div class="container">
                <h2><span id="housing-count">12</span> available housing units</h2>

                <div class="places-layout">
                    <div class="map-container">
                        <div id="map-display">
                            <img src="map-london-vintage.jpg" alt="Map of London locations">
                        </div>
                    </div>

                    <div class="houses-container">
                        <div class="houses-grid">
                            <div class="house-card">
                                <img src="manor-1.jpg" alt="Mayfair Mansion">
                                <div class="house-info">
                                    <p class="house-type">Grand Manor - Mayfair</p>
                                    <p class="house-price">From £450 / night</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
