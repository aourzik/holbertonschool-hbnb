<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Residences - Duchess & Duke</title>
    <link rel="stylesheet" href="style.css">

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <header class="main-header">
        <nav class="navbar">
            <a href="#home" class="logo-link">
                <div class="logo">
                    <img src="images/logo.png" alt="Duchess & Duke Icon" class="logo-icon">

                    <span class="logo-text" link="#home">
                        <span class="brand-name">Duchess & Duke</span>
                        <span class="brand-sub">Housing</span>
                    </span>
                </div>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="places.html">Places</a></li>
                <li><a href="index.html#main-footer">Contact us</a></li>
                <li><a href="connect.html" class="btn-connect">Connect</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <section class="rating-page-header">
            <div class="container">
                <h1>Rating & Comments</h1>
                <p>Discover what the Ton has to say about their stays.</p>
            </div>
        </section>
        <section class="user-review-submission">
            <div class="container">
                <h3>Share Your Experience</h3>
                <p>Did your stay live up to the expectations of the Ton?</p>

                <form id="review-form" class="review-card">
                    <div class="rating-input">
                        <label>Your Rating:</label>
                        <div class="stars">
                            <input type="radio" name="rating" value="5" id="star5"><label for="star5">★</label>
                            <input type="radio" name="rating" value="4" id="star4"><label for="star4">★</label>
                            <input type="radio" name="rating" value="3" id="star3"><label for="star3">★</label>
                            <input type="radio" name="rating" value="2" id="star2"><label for="star2">★</label>
                            <input type="radio" name="rating" value="1" id="star1"><label for="star1">★</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="review-comment">Your Thoughts</label>
                        <textarea id="review-comment" name="comment" rows="4"
                            placeholder="Write your review as Lady Whistledown would..."></textarea>
                    </div>

                    <button type="submit" class="btn-secondary">Post Review</button>
                </form>
            </div>
        </section>
